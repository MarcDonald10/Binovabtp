<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradCopenhagen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#1c1f26;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#555555;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#888888;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#gradCopenhagen)"/>
  
  <!-- Urban Above Ground -->
  <rect y="0" width="1200" height="250" fill="rgba(180,180,180,0.15)"/>
  
  <!-- Building Silhouettes -->
  <g opacity="0.3">
    <rect x="50" y="80" width="100" height="170" fill="#F4B400"/>
    <rect x="200" y="120" width="120" height="130" fill="#8CC63F"/>
    <rect x="400" y="90" width="90" height="160" fill="#F4B400"/>
    <rect x="550" y="110" width="110" height="140" fill="#8CC63F"/>
    <rect x="750" y="100" width="95" height="150" fill="#F4B400"/>
    <rect x="900" y="130" width="100" height="120" fill="#8CC63F"/>
    <rect x="1050" y="95" width="120" height="155" fill="#F4B400"/>
  </g>
  
  <!-- Streets -->
  <rect x="0" y="240" width="1200" height="40" fill="url(#roadGrad)" opacity="0.6"/>
  <line x1="0" y1="260" x2="1200" y2="260" stroke="#FFD54F" stroke-width="2" opacity="0.3" stroke-dasharray="20,10"/>
  
  <!-- Underground - Metro Line -->
  <rect x="100" y="350" width="1000" height="120" fill="rgba(140,198,63,0.15)" stroke="#8CC63F" stroke-width="2" rx="8"/>
  
  <!-- Tunnel Track -->
  <line x1="100" y1="400" x2="1100" y2="400" stroke="#666666" stroke-width="6"/>
  <line x1="100" y1="430" x2="1100" y2="430" stroke="#666666" stroke-width="6"/>
  
  <!-- Track Sleepers -->
  <g stroke="#888888" stroke-width="1" opacity="0.5">
    <rect x="120" y="410" width="60" height="8" />
    <rect x="250" y="410" width="60" height="8" />
    <rect x="380" y="410" width="60" height="8" />
    <rect x="510" y="410" width="60" height="8" />
    <rect x="640" y="410" width="60" height="8" />
    <rect x="770" y="410" width="60" height="8" />
    <rect x="900" y="410" width="60" height="8" />
    <rect x="1030" y="410" width="60" height="8" />
  </g>
  
  <!-- Train/Metro Car -->
  <g opacity="0.7">
    <rect x="700" y="360" width="250" height="80" fill="#4A4A4A" stroke="#F4B400" stroke-width="2" rx="4"/>
    <circle cx="750" cy="450" r="15" fill="#F4B400" opacity="0.6"/>
    <circle cx="900" cy="450" r="15" fill="#F4B400" opacity="0.6"/>
    <circle cx="920" cy="450" r="15" fill="#F4B400" opacity="0.6"/>
  </g>
  
  <!-- Station Platform -->
  <rect x="300" y="480" width="600" height="60" fill="rgba(244,180,0,0.2)" stroke="#F4B400" stroke-width="2"/>
  
  <!-- Vibration Sensors (stylized) -->
  <g fill="#00ff00" opacity="0.4">
    <circle cx="200" cy="500" r="8" />
    <circle cx="500" cy="500" r="8" />
    <circle cx="800" cy="500" r="8" />
    <circle cx="1050" cy="500" r="8" />
  </g>
  
  <!-- 17 km Indicator -->
  <line x1="100" y1="600" x2="1100" y2="600" stroke="#8CC63F" stroke-width="3" opacity="0.5"/>
  <text x="600" y="625" font-size="14" fill="#8CC63F" text-anchor="middle" font-weight="bold">17 KM DE TUNNELAGE</text>
  
  <!-- Statistics -->
  <rect x="50" y="680" width="400" height="100" fill="rgba(0,0,0,0.6)" stroke="#F4B400" stroke-width="2" rx="4"/>
  <text x="70" y="710" font-size="14" font-weight="bold" fill="#F4B400">COPENHAGUE - MÉTRO</text>
  <text x="70" y="735" font-size="11" fill="#8CC63F">17 km tunnel urbain</text>
  <text x="70" y="755" font-size="11" fill="#8CC63F">€3.2 Milliards</text>
  <text x="70" y="775" font-size="11" fill="#FFD54F">Zéro dommage structural</text>
</svg>