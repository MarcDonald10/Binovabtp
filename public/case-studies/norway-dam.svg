<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradNorway" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#2da578;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#4A4A4A;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="waterNor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#004a99;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#gradNorway)"/>
  
  <!-- Norwegian Mountain Valley -->
  <polygon points="0,200 300,50 600,100 900,40 1200,150 1200,700 0,700" fill="rgba(47,47,47,0.4)"/>
  
  <!-- Water Reservoir Before Excavation -->
  <polygon points="300,250 900,200 950,700 250,700" fill="url(#waterNor)" opacity="0.4"/>
  
  <!-- Excavated Terrace 1 -->
  <polygon points="200,400 400,350 420,500 220,550" fill="rgba(244,180,0,0.15)" stroke="#F4B400" stroke-width="2" opacity="0.7"/>
  
  <!-- Excavated Terrace 2 -->
  <polygon points="450,380 650,330 680,520 470,570" fill="rgba(244,180,0,0.12)" stroke="#F4B400" stroke-width="2" opacity="0.6"/>
  
  <!-- Excavated Terrace 3 -->
  <polygon points="700,350 900,300 930,560 720,600" fill="rgba(244,180,0,0.15)" stroke="#F4B400" stroke-width="2" opacity="0.7"/>
  
  <!-- Rock Face Texture -->
  <g stroke="#8c5e00" stroke-width="1" opacity="0.2">
    <line x1="250" y1="350" x2="270" y2="370" />
    <line x1="550" y1="330" x2="570" y2="350" />
    <line x1="850" y1="300" x2="870" y2="320" />
  </g>
  
  <!-- 30M m³ Extraction Line -->
  <line x1="150" y1="300" x2="1050" y2="300" stroke="#8CC63F" stroke-width="4" opacity="0.3"/>
  
  <!-- Equipment Positions -->
  <g opacity="0.5">
    <circle cx="300" cy="380" r="35" fill="rgba(244,180,0,0.2)" stroke="#F4B400" stroke-width="2"/>
    <circle cx="600" cy="350" r="40" fill="rgba(244,180,0,0.2)" stroke="#F4B400" stroke-width="2"/>
    <circle cx="900" cy="380" r="35" fill="rgba(244,180,0,0.2)" stroke="#F4B400" stroke-width="2"/>
  </g>
  
  <!-- Hydroelectric Potential -->
  <g fill="#00FFFF" opacity="0.3">
    <circle cx="250" cy="650" r="12" />
    <circle cx="600" cy="670" r="12" />
    <circle cx="950" cy="650" r="12" />
  </g>
  
  <!-- Flow Direction -->
  <path d="M 300 600 Q 600 650 900 600" stroke="#00FFFF" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="5,5"/>
  
  <!-- Snow Peaks -->
  <polygon points="300,50 250,120 350,120" fill="rgba(255,255,255,0.4)"/>
  <polygon points="900,40 850,100 950,100" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Statistics Box -->
  <rect x="50" y="50" width="380" height="160" fill="rgba(0,0,0,0.6)" stroke="#F4B400" stroke-width="2" rx="4"/>
  <text x="70" y="85" font-size="16" font-weight="bold" fill="#F4B400">NORVÈGE - BARRAGE</text>
  <text x="70" y="110" font-size="12" fill="#8CC63F">30M m³ excavés</text>
  <text x="70" y="135" font-size="12" fill="#8CC63F">€980 Millions</text>
  <text x="70" y="160" font-size="12" fill="#8CC63F">550 GWh/an produits</text>
  <text x="70" y="185" font-size="12" fill="#FFD54F">3 mois d'avance</text>
  <text x="70" y="200" font-size="11" fill="#8CC63F">-18% coût unitaire</text>
</svg>