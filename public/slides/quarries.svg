<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradQuarry" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#A0826D;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4A4A4A;stop-opacity:0.9" />
    </linearGradient>
    <pattern id="rockPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#8B7355"/>
      <circle cx="10" cy="10" r="5" fill="#704a32" opacity="0.5"/>
      <circle cx="30" cy="25" r="4" fill="#704a32" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#gradQuarry)"/>
  
  <!-- Ground Pattern -->
  <rect width="1920" height="1080" fill="url(#rockPattern)"/>
  
  <!-- Quarry Terraces -->
  <polygon points="0,300 400,400 400,500 0,450" fill="rgba(244,180,0,0.15)" stroke="#F4B400" stroke-width="3" opacity="0.6"/>
  <polygon points="400,400 800,350 800,480 400,500" fill="rgba(244,180,0,0.1)" stroke="#F4B400" stroke-width="3" opacity="0.5"/>
  <polygon points="800,350 1200,250 1200,420 800,480" fill="rgba(244,180,0,0.12)" stroke="#F4B400" stroke-width="3" opacity="0.55"/>
  <polygon points="1200,250 1600,300 1600,480 1200,420" fill="rgba(244,180,0,0.1)" stroke="#F4B400" stroke-width="3" opacity="0.5"/>
  <polygon points="1600,300 1920,250 1920,550 1600,480" fill="rgba(244,180,0,0.15)" stroke="#F4B400" stroke-width="3" opacity="0.6"/>
  
  <!-- Rock Blocks -->
  <g opacity="0.4">
    <rect x="150" y="420" width="80" height="80" fill="#704a32" stroke="#F4B400" stroke-width="2"/>
    <rect x="700" y="380" width="100" height="100" fill="#704a32" stroke="#F4B400" stroke-width="2"/>
    <rect x="1350" y="350" width="90" height="90" fill="#704a32" stroke="#F4B400" stroke-width="2"/>
  </g>
  
  <!-- Equipment Markers -->
  <circle cx="300" cy="320" r="25" fill="rgba(244,180,0,0.3)" stroke="#F4B400" stroke-width="2" opacity="0.7"/>
  <circle cx="1000" cy="280" r="30" fill="rgba(244,180,0,0.25)" stroke="#F4B400" stroke-width="2" opacity="0.6"/>
  <circle cx="1700" cy="200" r="28" fill="rgba(244,180,0,0.3)" stroke="#F4B400" stroke-width="2" opacity="0.65"/>
  
  <!-- Dust/Haze Effect -->
  <ellipse cx="960" cy="400" rx="600" ry="300" fill="rgba(255,200,0,0.08)" opacity="0.5"/>
  
  <!-- Horizon Line -->
  <line x1="0" y1="250" x2="1920" y2="250" stroke="rgba(244,180,0,0.1)" stroke-width="2" opacity="0.5"/>
  
  <!-- Sky Accent -->
  <rect width="1920" height="250" fill="rgba(139,115,85,0.3)"/>
  
  <!-- Text -->
  <text x="960" y="150" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.08)" text-anchor="middle" font-family="Arial">
    CARRIÈRES PREMIUM
  </text>
</svg>