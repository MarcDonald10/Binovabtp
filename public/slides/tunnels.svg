<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradTunnel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1c1f26;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="tunnelLight" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#F4B400;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#F4B400;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#gradTunnel)"/>
  
  <!-- Tunnel Perspective -->
  <polygon points="960,100 200,400 200,800 1720,800 1720,400 960,100" fill="url(#tunnelLight)" opacity="0.6"/>
  
  <!-- Tunnel Walls -->
  <polyline points="200,400 200,800 1720,800 1720,400" fill="none" stroke="#8CC63F" stroke-width="8" opacity="0.4"/>
  <polyline points="960,100 200,400" fill="none" stroke="rgba(244,180,0,0.3)" stroke-width="6"/>
  <polyline points="960,100 1720,400" fill="none" stroke="rgba(244,180,0,0.3)" stroke-width="6"/>
  
  <!-- Rock Texture -->
  <circle cx="400" cy="500" r="40" fill="rgba(140, 198, 63, 0.2)" opacity="0.5"/>
  <circle cx="800" cy="650" r="35" fill="rgba(140, 198, 63, 0.2)" opacity="0.4"/>
  <circle cx="1300" cy="600" r="45" fill="rgba(140, 198, 63, 0.2)" opacity="0.5"/>
  <circle cx="1600" cy="700" r="30" fill="rgba(140, 198, 63, 0.15)" opacity="0.4"/>
  
  <!-- Lighting -->
  <ellipse cx="960" cy="300" rx="400" ry="200" fill="rgba(244,180,0,0.15)" opacity="0.3"/>
  
  <!-- Support Beams -->
  <rect x="450" y="400" width="12" height="400" fill="rgba(244,180,0,0.3)"/>
  <rect x="960" y="350" width="10" height="450" fill="rgba(244,180,0,0.35)"/>
  <rect x="1450" y="410" width="12" height="390" fill="rgba(244,180,0,0.3)"/>
  
  <!-- Grid Lines for Depth -->
  <g stroke="rgba(140,198,63,0.1)" stroke-width="1">
    <line x1="200" y1="500" x2="1720" y2="500" />
    <line x1="200" y1="600" x2="1720" y2="600" />
    <line x1="200" y1="700" x2="1720" y2="700" />
  </g>
  
  <!-- Text -->
  <text x="960" y="250" font-size="68" font-weight="bold" fill="rgba(255,255,255,0.08)" text-anchor="middle" font-family="Arial">
    TRAVAUX SOUTERRAINS
  </text>
</svg>