<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradCivil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6B3A;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#2da578;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4A4A4A;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#gradCivil)"/>
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)" />
  
  <!-- Building Structure -->
  <rect x="200" y="300" width="150" height="500" fill="rgba(244, 180, 0, 0.3)" stroke="#F4B400" stroke-width="3"/>
  <rect x="500" y="200" width="180" height="600" fill="rgba(244, 180, 0, 0.25)" stroke="#F4B400" stroke-width="3"/>
  <rect x="850" y="350" width="200" height="450" fill="rgba(244, 180, 0, 0.3)" stroke="#F4B400" stroke-width="3"/>
  <rect x="1200" y="250" width="160" height="550" fill="rgba(244, 180, 0, 0.25)" stroke="#F4B400" stroke-width="3"/>
  
  <!-- Windows -->
  <g fill="#F4B400" opacity="0.6">
    <rect x="220" y="320" width="30" height="30" />
    <rect x="270" y="320" width="30" height="30" />
    <rect x="220" y="380" width="30" height="30" />
    <rect x="270" y="380" width="30" height="30" />
    <rect x="220" y="440" width="30" height="30" />
    <rect x="270" y="440" width="30" height="30" />
  </g>
  
  <!-- Bridge/Connection -->
  <line x1="400" y1="400" x2="700" y2="400" stroke="#F4B400" stroke-width="8" opacity="0.5"/>
  
  <!-- Accent Elements -->
  <circle cx="150" cy="150" r="80" fill="rgba(244, 180, 0, 0.2)" stroke="#F4B400" stroke-width="2"/>
  <circle cx="1750" cy="900" r="120" fill="rgba(244, 180, 0, 0.15)" stroke="#F4B400" stroke-width="2"/>
  
  <!-- Text -->
  <text x="960" y="200" font-size="72" font-weight="bold" fill="rgba(255,255,255,0.1)" text-anchor="middle" font-family="Arial">
    GÉNIE CIVIL
  </text>
</svg>